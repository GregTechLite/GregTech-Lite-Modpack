name: Release Modpack Build

on:
  push:
    tags:
      - "v*"

env:
  PAGES_REPO: GregTechLite/gregtechlite.github.io
  PAGES_BRANCH: main
  PAGES_BASE_URL: https://gregtechlite.github.io

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - name: Package modpack
        id: package
        shell: 'nix develop -c bash -e {0}'
        env:
          BUILD_KIND: release
          PAGES_BASE_URL: ${{ env.PAGES_BASE_URL }}
        run: bash .github/scripts/package-client.sh

      - name: Prepare manifest
        id: stage_pages
        shell: 'nix develop -c bash -e {0}'
        run: bash .github/scripts/manifest.sh "${{ steps.package.outputs.pages_path }}"

      - name: Deploy release Pages content
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_REPO_TOKEN }}
          external_repository: ${{ env.PAGES_REPO }}
          publish_branch: ${{ env.PAGES_BRANCH }}
          publish_dir: ${{ steps.stage_pages.outputs.pages_dir }}/${{ steps.package.outputs.pages_path }}
          destination_dir: ${{ steps.package.outputs.pages_path }}
          full_commit_message: "Release ${{ github.ref_name }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          files: |
            ${{ steps.package.outputs.curseforge_zip }}
            ${{ steps.package.outputs.server_zip }}
          overwrite_files: true
          fail_on_unmatched_files: true
